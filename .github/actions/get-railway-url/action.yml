name: Get Railway URL
description: Install Railway CLI, link to an environment, and return its domain URL.

inputs:
  railway-api-token:
    description: Railway API token
    required: true
  railway-project-id:
    description: Railway project ID
    required: true
  railway-environment:
    description: Railway environment name
    required: true
  railway-service:
    description: Railway service name
    required: true
  wait-for-domain:
    description: Wait for Railway domain to become available before returning
    required: false
    default: 'false'

outputs:
  api-url:
    description: The Railway API URL
    value: ${{ steps.get-api-url.outputs.api_url }}

runs:
  using: composite
  steps:
    - name: Install Railway CLI
      shell: bash
      run: npm install --global @railway/cli

    - name: Link to Railway environment and service
      shell: bash
      env:
        RAILWAY_API_TOKEN: ${{ inputs.railway-api-token }}
        RAILWAY_PROJECT_ID: ${{ inputs.railway-project-id }}
        RAILWAY_ENVIRONMENT: ${{ inputs.railway-environment }}
        RAILWAY_SERVICE: ${{ inputs.railway-service }}
      run: |
        set -ux

        railway link \
          --project "${RAILWAY_PROJECT_ID}" \
          --environment "${RAILWAY_ENVIRONMENT}" \
          --service "${RAILWAY_SERVICE}"

    - name: Wait for Railway domain to be available
      if: inputs.wait-for-domain == 'true'
      uses: nick-fields/retry@v3.0.2
      with:
        timeout_seconds: 30
        max_attempts: 20
        retry_wait_seconds: 15
        retry_on: error
        command: railway domain --json | jq -e '.domains | length > 0'

    - name: Get Railway URL
      id: get-api-url
      shell: bash
      env:
        RAILWAY_API_TOKEN: ${{ inputs.railway-api-token }}
      run: |
        set -ux

        API_URL=$(railway domain --json | jq -r '.domains[0]')
        echo "api_url=${API_URL}" >> "${GITHUB_OUTPUT}"
