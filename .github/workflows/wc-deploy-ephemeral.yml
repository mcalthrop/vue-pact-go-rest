name: Deploy Ephemeral

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      branch:
        required: true
        type: string
      sha:
        required: true
        type: string
    outputs:
      api_url:
        description: 'Railway API preview URL'
        value: ${{ jobs.wait-for-api.outputs.api_url }}
      frontend_url:
        description: 'Netlify frontend preview URL'
        value: ${{ jobs.deploy-frontend.outputs.frontend_url }}
    secrets:
      RAILWAY_API_TOKEN:
        required: true
      RAILWAY_PROJECT_ID:
        required: true
      NETLIFY_AUTH_TOKEN:
        required: true
      NETLIFY_SITE_ID:
        required: true

env:
  RAILWAY_ENV: vue-pact-go-rest-pr-${{ inputs.pr_number }}
  RAILWAY_SERVICE: '@vue-pact-go-rest/api'

jobs:
  # ── Wait for Railway's automatic deployment ——
  wait-for-api:
    name: Wait for API (Railway)
    runs-on: ubuntu-latest
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
    outputs:
      api_url: ${{ steps.get-api-url.outputs.api_url }}

    steps:
      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Link to Railway environment and service
        run: |
          set -ux

          railway link \
            --project "${RAILWAY_PROJECT_ID}" \
            --environment "${RAILWAY_ENV}" \
            --service "${RAILWAY_SERVICE}"

      - name: Wait for Railway domain to be available
        uses: nick-fields/retry@v3.0.2
        with:
          timeout_seconds: 30
          max_attempts: 20
          retry_wait_seconds: 15
          retry_on: error
          command: railway domain --json | jq -e '.domains | length > 0'

      - name: Get Railway URL
        id: get-api-url
        run: |
          set -ux

          API_URL=$(railway domain --json | jq -r '.domains[0]')
          echo "api_url=${API_URL}" >> "${GITHUB_OUTPUT}"

  # ── Build and deploy frontend to Netlify ——
  deploy-frontend:
    needs: wait-for-api
    name: Deploy frontend (Netlify)
    runs-on: ubuntu-latest
    outputs:
      frontend_url: ${{ steps.deploy-to-netlify.outputs.frontend_url }}

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v4.4.0

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ needs.wait-for-api.outputs.api_url }}
        run: |
          set -ux

          export VITE_API_BASE_URL
          pnpm --filter frontend build-only

      - name: Deploy to Netlify
        id: deploy-to-netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -ux

          BRANCH_NAME="${{ inputs.branch }}"
          grep VITE_API_BASE_URL --files-with-matches apps/frontend/dist/assets/*.js || :
          NETLIFY_OUTPUT=$(pnpm exec netlify deploy \
            --filter @vue-pact-go-rest/frontend \
            --dir apps/frontend/dist \
            --context branch:${BRANCH_NAME} \
            --message "PR #${{ inputs.pr_number }} (${{ inputs.sha }})" \
            --json 2>&1)
          FRONTEND_URL=$(echo "${NETLIFY_OUTPUT}" | jq --raw-output '.deploy_url')

          pnpm exec netlify \
            --filter @vue-pact-go-rest/frontend \
            --context branch:${BRANCH_NAME} \
            env:list

          pnpm exec netlify \
            --filter @vue-pact-go-rest/frontend \
            --context branch:${BRANCH_NAME} \
            env:set VITE_API_BASE_URL "${VITE_API_BASE_URL}"

          echo "frontend_url=${FRONTEND_URL}" >> "${GITHUB_OUTPUT}"

  # ── Verify Pact contracts against the deployed API ——
  pact-verify:
    needs: wait-for-api
    name: Pact verify (deployed API)
    uses: ./.github/workflows/wc-pact.yml
    with:
      branch: ${{ inputs.branch }}
      provider_base_url: ${{ needs.wait-for-api.outputs.api_url }}
      sha: ${{ inputs.sha }}

  # ── Post preview URLs as a PR comment ——
  comment:
    needs: [wait-for-api, deploy-frontend]
    name: Post preview URLs
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/github-script@v8.0.0
        with:
          script: |
            const issue_number = Number('${{ inputs.pr_number }}');
            const apiUrl       = '${{ needs.wait-for-api.outputs.api_url }}';
            const frontendUrl  = '${{ needs.deploy-frontend.outputs.frontend_url }}';
            const body = [
              '## Ephemeral environments',
              '',
              '| Service  | URL |',
              '| -------- | --- |',
              `| Frontend | ${frontendUrl} |`,
              `| API      | ${apiUrl}/recipes |`,
            ].join('\n');
            const { repo: { owner, repo } } = context;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });

            const existing = comments.find(({ body }) => body.includes('## Ephemeral environments'));
            if (existing) {
              const comment_id = existing.id;
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
