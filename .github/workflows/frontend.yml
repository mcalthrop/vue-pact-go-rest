name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v4.4.0
        with:
          version: 10.18.1

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm --filter @vue-pact-go-rest/frontend lint

      - name: Format check
        run: pnpm --filter @vue-pact-go-rest/frontend format:check

      - name: Coverage
        run: pnpm --filter @vue-pact-go-rest/frontend coverage

      - name: Build
        run: pnpm --filter @vue-pact-go-rest/frontend build

  pact-publish:
    name: Pact publish
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: pact
          POSTGRES_PASSWORD: pact
          POSTGRES_DB: pact
        options: >-
          --health-cmd "pg_isready -U pact"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      pact-broker:
        image: pactfoundation/pact-broker:2.113.0
        env:
          PACT_BROKER_DATABASE_URL: postgres://pact:pact@postgres/pact
          PACT_BROKER_BASIC_AUTH_USERNAME: pact
          PACT_BROKER_BASIC_AUTH_PASSWORD: pact
          PACT_BROKER_ALLOW_PUBLIC_READ: "true"
        ports:
          - 9292:9292
        options: >-
          --health-cmd "wget -q -O /dev/null http://localhost:9292/diagnostic/status/heartbeat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v4.4.0
        with:
          version: 10.18.1

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Pact consumer tests
        run: pnpm --filter @vue-pact-go-rest/frontend pact:test

      - name: Publish Pact contracts
        run: pnpm --filter @vue-pact-go-rest/frontend pact:publish
