name: Pact

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string

jobs:
  pact:
    name: Pact
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: pact
          POSTGRES_PASSWORD: pact
          POSTGRES_DB: pact
        options: >-
          --health-cmd "pg_isready -U pact"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      pact-broker:
        image: pactfoundation/pact-broker:2.137.0-pactbroker2.118.0
        env:
          PACT_BROKER_DATABASE_URL: postgres://pact:pact@postgres/pact
          PACT_BROKER_BASIC_AUTH_USERNAME: pact
          PACT_BROKER_BASIC_AUTH_PASSWORD: pact
          PACT_BROKER_ALLOW_PUBLIC_READ: 'true'
          PACT_BROKER_PUBLIC_HEARTBEAT: 'true'
          PACT_BROKER_DATABASE_CONNECT_MAX_RETRIES: '30'
        ports:
          - 9292:9292

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Wait for Pact Broker
        uses: nick-fields/retry@v3.0.2
        with:
          timeout_seconds: 10
          max_attempts: 30
          retry_wait_seconds: 5
          retry_on: error
          command: wget -q -O /dev/null http://localhost:9292/diagnostic/status/heartbeat

      - uses: pnpm/action-setup@v4.4.0

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Pact consumer tests
        run: pnpm pact:consumer-test

      - name: Publish Pact contracts
        run: pnpm pact:consumer-publish
        env:
          PACT_CONSUMER_BRANCH: ${{ inputs.branch }}

      - name: Install Pact FFI library
        working-directory: apps/api
        run: |
          go run github.com/pact-foundation/pact-go/v2 install --libDir "$HOME/pact-lib"
          echo "CGO_LDFLAGS=-L$HOME/pact-lib" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/pact-lib" >> "$GITHUB_ENV"

      - name: Verify Pact contracts
        run: pnpm pact:provider-verify
        env:
          PACT_PUBLISH_RESULTS: 'true'
          PACT_PROVIDER_VERSION: ${{ github.sha }}
          PACT_PROVIDER_BRANCH: ${{ inputs.branch }}
