name: Pact

on:
  workflow_call:

jobs:
  pact:
    name: Pact
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: pact
          POSTGRES_PASSWORD: pact
          POSTGRES_DB: pact
        options: >-
          --health-cmd "pg_isready -U pact"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      pact-broker:
        image: pactfoundation/pact-broker:2.113.0
        env:
          PACT_BROKER_DATABASE_URL: postgres://pact:pact@postgres/pact
          PACT_BROKER_BASIC_AUTH_USERNAME: pact
          PACT_BROKER_BASIC_AUTH_PASSWORD: pact
          PACT_BROKER_ALLOW_PUBLIC_READ: "true"
        ports:
          - 9292:9292
        options: >-
          --health-cmd "wget -q -O /dev/null http://localhost:9292/diagnostic/status/heartbeat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v4.4.0

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Pact consumer tests
        run: pnpm pact:consumer-test

      - name: Publish Pact contracts
        run: pnpm pact:consumer-publish

      - name: Verify Pact contracts
        run: pnpm pact:provider-verify
        env:
          PACT_PUBLISH_RESULTS: "true"
          PACT_PROVIDER_VERSION: ${{ github.sha }}
