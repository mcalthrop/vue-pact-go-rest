name: Build and test

on:
  workflow_call:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v4.4.0

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.11.3
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Type check
        run: pnpm type-check

      - name: Format check
        run: pnpm --filter @vue-pact-go-rest/frontend format:check

      - name: Lint
        run: pnpm lint

      - name: Coverage
        run: pnpm coverage

      - name: Build
        run: pnpm build

      - name: Check generated types are up to date
        run: |
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest
          pnpm --filter @vue-pact-go-rest/api generate
          git diff --exit-code apps/api/internal/gen/
