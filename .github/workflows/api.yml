name: API CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          working-directory: apps/api

      - name: Coverage
        run: make coverage

      - name: Check generated types are up to date
        run: |
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest
          make generate
          git diff --exit-code internal/gen/

      - name: Build
        run: make build

  pact-verify:
    name: Pact verify
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: pact
          POSTGRES_PASSWORD: pact
          POSTGRES_DB: pact
        options: >-
          --health-cmd "pg_isready -U pact"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      pact-broker:
        image: pactfoundation/pact-broker:2.113.0
        env:
          PACT_BROKER_DATABASE_URL: postgres://pact:pact@postgres/pact
          PACT_BROKER_BASIC_AUTH_USERNAME: pact
          PACT_BROKER_BASIC_AUTH_PASSWORD: pact
          PACT_BROKER_ALLOW_PUBLIC_READ: "true"
        ports:
          - 9292:9292
        options: >-
          --health-cmd "wget -q -O /dev/null http://localhost:9292/diagnostic/status/heartbeat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v4.4.0

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Pact consumer tests
        run: pnpm --filter @vue-pact-go-rest/frontend pact:test

      - name: Publish Pact contracts
        run: pnpm --filter @vue-pact-go-rest/frontend pact:publish

      - name: Verify Pact contracts
        run: make pact:verify
        working-directory: apps/api
        env:
          PACT_PUBLISH_RESULTS: "true"
          PACT_PROVIDER_VERSION: ${{ github.sha }}
