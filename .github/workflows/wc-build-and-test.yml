name: Build and test

on:
  workflow_call:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: pnpm/action-setup@v5.0.0

      - name: Debug pnpm selection
        run: |
          set -ux pipefail

          which pnpm || true
          pnpm --version || true
          node --version || true

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.11.3/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.11.3
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Type check
        run: pnpm type-check

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Test with coverage
        run: pnpm coverage

      - name: Build
        run: pnpm build

      - name: Check generated types are up to date
        run: |
          pnpm generate:types
          git diff --exit-code apps/api/internal/gen/ apps/frontend/src/types/api.gen.ts
