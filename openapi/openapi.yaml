openapi: '3.0.3'

info:
  title: Bread Recipes API
  description: REST API for browsing bread recipes
  version: '1.0.0'
  contact:
    name: API Support
    url: https://github.com/mcalthrop/vue-pact-go-rest
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

tags:
  - name: recipes
    description: Bread recipe operations

servers:
  - url: http://localhost:8080
    description: Local development server

security: []

paths:
  /recipes:
    get:
      operationId: listRecipes
      summary: List all recipes
      description: Returns a summary list of all available bread recipes.
      tags:
        - recipes
      responses:
        '200':
          description: A list of bread recipes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeList'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /recipes/{id}:
    get:
      operationId: getRecipe
      summary: Get a recipe by ID
      description: Returns the full details of a single bread recipe.
      tags:
        - recipes
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the recipe
          schema:
            type: string
      responses:
        '200':
          description: A single bread recipe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipe'
        '404':
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    RecipeSummary:
      type: object
      required:
        - id
        - name
        - summary
        - photo_url
      properties:
        id:
          type: string
          description: Unique identifier for the recipe
          example: sourdough-boule
        name:
          type: string
          description: Display name of the bread recipe
          example: Classic Sourdough Boule
        summary:
          type: string
          description: Short one-line description of the recipe
          example: A tangy, chewy sourdough loaf with a crisp crust
        photo_url:
          type: string
          format: uri-reference
          description: URI reference (absolute or relative) of the recipe photo
          example: /images/sourdough-boule.jpg

    Recipe:
      allOf:
        - $ref: '#/components/schemas/RecipeSummary'
        - type: object
          required:
            - description
            - ingredients
            - instructions
          properties:
            description:
              type: string
              description: Full description of the recipe and its characteristics
              example: >
                A traditional sourdough boule with a complex flavour developed
                over a long cold fermentation. The crust is deeply caramelised
                and the crumb is open and chewy.
            ingredients:
              type: array
              description: List of ingredients with quantities
              minItems: 1
              items:
                $ref: '#/components/schemas/Ingredient'
            instructions:
              type: array
              description: Ordered list of preparation steps
              minItems: 1
              items:
                $ref: '#/components/schemas/Instruction'

    Ingredient:
      type: object
      required:
        - quantity
        - unit
        - name
      properties:
        quantity:
          type: number
          description: Amount of the ingredient
          example: 500
        unit:
          type: string
          description: Unit of measurement (e.g. g, ml, tsp)
          example: g
        name:
          type: string
          description: Name of the ingredient
          example: strong white bread flour

    Instruction:
      type: object
      required:
        - step
        - description
      properties:
        step:
          type: integer
          description: Step number (1-based)
          example: 1
        description:
          type: string
          description: Description of what to do in this step
          example: Mix the flour and water together and leave to autolyse for 30 minutes.

    RecipeList:
      type: object
      required:
        - recipes
      properties:
        recipes:
          type: array
          items:
            $ref: '#/components/schemas/RecipeSummary'

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: HTTP status code
          example: 404
        message:
          type: string
          description: Human-readable error message
          example: Recipe not found
